name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          check-latest: true

      - name: Run tests
        run: go test ./...

      - name: Build release packages
        run: scripts/package.sh "$GITHUB_REF_NAME" dist

      - name: Generate release manifest
        run: scripts/gen_latest_json.sh "$GITHUB_REF_NAME" dist "$GITHUB_REPOSITORY"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/checksums.txt
            dist/latest.json
            dist/knot-*.tar.gz
            dist/knot-*.zip

      - name: Sync release metadata to Cloudflare KV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
        run: |
          scripts/sync_cloudflare_kv.sh latest.json dist/latest.json
          scripts/sync_cloudflare_kv.sh "releases/$GITHUB_REF_NAME/manifest.json" dist/latest.json
          scripts/sync_cloudflare_kv.sh install.sh scripts/install.sh
          scripts/sync_cloudflare_kv.sh install.ps1 scripts/install.ps1
