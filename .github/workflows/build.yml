name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          check-latest: true

      - name: Run tests
        run: go test -v ./...

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary_name: knot
            asset_name: knot-linux-amd64
          - goos: linux
            goarch: arm64
            binary_name: knot
            asset_name: knot-linux-arm64
          - goos: darwin
            goarch: amd64
            binary_name: knot
            asset_name: knot-darwin-amd64
          - goos: darwin
            goarch: arm64
            binary_name: knot
            asset_name: knot-darwin-arm64
          - goos: windows
            goarch: amd64
            binary_name: knot.exe
            asset_name: knot-windows-amd64
          - goos: windows
            goarch: arm64
            binary_name: knot.exe
            asset_name: knot-windows-arm64

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          check-latest: true

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p "bin/${{ matrix.asset_name }}"
          go build -trimpath -v -o "bin/${{ matrix.asset_name }}/${{ matrix.binary_name }}" ./cmd/knot

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: bin/${{ matrix.asset_name }}/${{ matrix.binary_name }}
